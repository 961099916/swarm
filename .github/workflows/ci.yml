# Swarm CI — 企业级全量代码质量门禁
#
# 每次 push 到 main 或 PR 时运行：
#   1. type-check (tsc --noEmit) — 所有 Worker
#   2. lint (eslint)
#   3. test (vitest)
#   4. security audit (npm audit + hardcoded secrets scan)
#   5. build / bundle size check
#
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ─── 代码质量门禁 ───
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ─── 后端 ───
      - name: 📦 Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: 🔎 TypeScript type check — kernel
        working-directory: backend/packages/kernel
        run: npx tsc --noEmit

      - name: 🔎 TypeScript type check — gateway
        working-directory: backend/workers/gateway
        run: npx tsc --noEmit

      - name: 🔎 TypeScript type check — workflow
        working-directory: backend/workers/workflow
        run: npx tsc --noEmit

      - name: 🔍 ESLint — backend
        working-directory: backend
        run: npx eslint packages/ workers/ --ext .ts --max-warnings 50

      - name: 🧪 Unit tests — kernel
        working-directory: backend/packages/kernel
        run: npx vitest run

      # ─── 前端 ───
      - name: 📦 Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: 🔎 TypeScript type check — frontend
        working-directory: frontend
        continue-on-error: true
        run: npx tsc --noEmit 2>&1 | tail -10

      - name: 🏗️ Build Tailwind CSS
        working-directory: frontend
        run: npm run build:tailwind 2>/dev/null || true

  # ─── 安全审计（单独 job，避免影响质量门禁） ───
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality]  # 等质量门禁通过后再运行

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🔒 npm audit — backend
        working-directory: backend
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: 🔒 npm audit — frontend
        working-directory: frontend
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: 🔒 Hardcoded secrets scan
        run: |
          # 扫描常见的 API Key / Token 模式
          if grep -rn "sk-[A-Za-z0-9]\{20,\}\|ghp_\|gho_\|ghu_\|ghs_\|ghr_" \
            --include="*.ts" --include="*.js" --include="*.json" --include="*.yaml" \
            --include="*.yml" --include="*.toml" . 2>/dev/null | \
            grep -v "node_modules\|\.wrangler\|\.npm-cache\|package-lock" | grep .; then
            echo "::error::❌ 发现疑似硬编码 Secret!"
            exit 1
          fi
          echo "::notice::✅ 无硬编码 Secret"

      - name: 🔒 Secret file check
        run: |
          # 检查是否有 .env 文件意外提交
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "::error::❌ .env 文件被提交到 Git！"
            exit 1
          fi
          echo "::notice::✅ 无 .env 文件泄露"

  # ─── 通知 ───
  notify-on-failure:
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'
    needs: [quality, security]

    steps:
      - name: ⚠️ 发送失败通知
        run: |
          echo "::warning::CI 流水线失败，请立即检查"
          echo "  Workflow: ${{ github.workflow }}"
          echo "  Branch: ${{ github.ref }}"
          echo "  Commit: ${{ github.sha }}"
