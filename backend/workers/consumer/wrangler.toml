# File: /Users/zhangjiahao/IdeaProjects/swarm/backend/workers/consumer/wrangler.toml
name = "swarm-consumer"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[observability]
enabled = true

# 需要 D1 数据库来更新任务状态
[[d1_databases]]
binding = "DB"
database_name = "swarm-db"
database_id = "4f360bda-ea4b-4fde-b3a0-d759f4180295"

# 需要 KV 缓存（可选，用于去重）
[[kv_namespaces]]
binding = "CACHE_KV"
id = "ac5430ca9d234186862f6b4300d50b5a"

# 需要 Workflows 绑定来启动工作流
[[workflows]]
name = "swarm-task-workflow"
binding = "TASK_WORKFLOW"
class_name = "TaskOrchestrator"
script_name = "swarm-workflow"

# 消费队列
[[queues.consumers]]
queue = "swarm-task-queue"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 3
dead_letter_queue = "swarm-task-dlq"
